# ─────────────────────────────────────────────────────────────────────────────
# Netlify configuration — Profitability Intelligence
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

# ── Serverless function settings ──────────────────────────────────────────────
[functions]
  directory         = "netlify/functions"
  node_bundler      = "esbuild"

# ── API proxy — MUST come before the SPA catch-all ───────────────────────────
# Routes /api-proxy POST requests to the Netlify Function.
# The function reads all config (endpoint, key, auth style) from server-side
# environment variables, so nothing sensitive is exposed in the JS bundle.
[[redirects]]
  from   = "/api-proxy"
  to     = "/.netlify/functions/api-proxy"
  status = 200
  force  = true

# ── SPA fallback — serves index.html for all unmatched client-side routes ────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
