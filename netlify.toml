# ─────────────────────────────────────────────────────────────────────────────
# Netlify configuration — Profitability Intelligence
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

# ── API proxy — MUST come before the SPA catch-all ───────────────────────────
# Netlify forwards /api-proxy/* to your AI endpoint server-side,
# which avoids CORS errors that would occur with direct browser requests.
# The :splat captures the full path after /api-proxy and appends it to the
# origin of VITE_API_ENDPOINT (set this in the Netlify dashboard env vars).
[[redirects]]
  from   = "/api-proxy/*"
  to     = "https://eyq-incubator.america.fabric.ey.com/:splat"
  status = 200
  force  = true

# ── SPA fallback — serves index.html for all unmatched client-side routes ────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
